interface:
  display_name: "Hatch Spirit Pet"
  short_description: "Hatch Codex-compatible animated spirit pet spritesheets"
  default_prompt: "Hatch a Codex-compatible animated spirit pet from a prepared run or a new concept. Treat Codex as the orchestrator: prepare or read imagegen-jobs.json, use $imagegen for the base, delegate grounded row-strip generation to sub-agents when available, have sub-agents return only original $CODEX_HOME/generated_images/.../ig_*.png paths plus QA notes, and keep recording, repairs, mirroring decisions, finalization, atlas validation, preview rendering, and packaging in the parent agent. Python scripts prepare, record, validate, and package; they do not spawn sub-agents."
